const articles = [
  {id:1,rank:1,title:"NVIDIA GTC 2026 Kicks Off: Vera Rubin, NemoClaw Agents, and the Next AI Infrastructure Wave",url:"https://blogs.nvidia.com/blog/gtc-2026-news/",source:"NVIDIA Blog",published:"2026-03-16",category:"Data Infra",summary:"NVIDIA's GTC 2026 opens today in San Jose with 30,000 attendees. Jensen Huang's keynote unveils Vera Rubin (3.3-5x inference gains over Blackwell), NemoClaw open-source enterprise AI agent platform, and details on Feynman GPU roadmap.",overview:"NVIDIA GTC 2026 is the first marquee AI event of the year, spanning March 16-19 with over 1,000 sessions. The centerpiece is the Vera Rubin platform â successor to Blackwell â featuring a custom Vera CPU, sixth-generation HBM4 memory, and delivering up to 5x inference performance improvement with a 10x reduction in token costs. NemoClaw, NVIDIA's anticipated open-source platform for building enterprise AI agents, signals the company's push into the agentic AI software stack. Jensen Huang will also preview the Feynman GPU (2028) and potentially unveil N1/N1X laptop CPUs. With hyperscalers planning to spend nearly $700 billion on data center projects in 2026 alone, these announcements set the infrastructure trajectory for the entire AI industry.",score:0.94},
  {id:2,rank:2,title:"Perplexity Launches 'Computer for Enterprise' â Multi-Model AI Agent Takes Aim at Microsoft and Salesforce",url:"https://venturebeat.com/technology/perplexity-takes-its-computer-ai-agent-into-the-enterprise-taking-aim-at/",source:"VentureBeat",published:"2026-03-11",category:"Agentic AI",summary:"At its Ask 2026 conference, Perplexity unveiled Computer for Enterprise â a multi-model AI agent with Slack integration, Snowflake connectors, SOC 2 Type II compliance, and 20 orchestrated AI models. Targets $656M ARR by year-end.",overview:"Perplexity is making its boldest enterprise play yet with Computer for Enterprise, directly challenging Microsoft Copilot and Salesforce Agentforce. The platform orchestrates 20 AI models to execute complex multi-step tasks, connecting natively to Snowflake, Salesforce, HubSpot, and hundreds of enterprise platforms. The enterprise version adds SOC 2 Type II compliance, SAML SSO, audit logs, and isolated sandboxing per query. Alongside this, Perplexity launched Personal Computer â software that runs continuously on a Mac mini giving AI persistent access to local files and apps ($200/month for Max subscribers). With annualized revenue around $148M and targeting $656M ARR by end of 2026, this represents a serious pivot from consumer search to enterprise agentic AI.",score:0.93},
  {id:3,rank:3,title:"Enterprise AI ROI Shifts: Agentic Priorities Surge 31.5% as Productivity Falls as Top Metric",url:"https://futurumgroup.com/press-release/enterprise-ai-roi-shifts-as-agentic-priorities-surge/",source:"Futurum Group",published:"2026-03-10",category:"Agentic AI",summary:"Futurum's 1H 2026 survey of 830 IT decision-makers reveals a structural shift: direct P&L impact nearly doubled to 21.7% as the primary ROI metric, while productivity gains fell from 23.8% to 18%. Agentic AI surged 31.5% YoY as a top priority.",overview:"This survey marks a watershed moment in enterprise AI measurement. For the first time, direct financial impact â combining top-line revenue growth and bottom-line profitability â has overtaken productivity as the primary way enterprises measure AI ROI. As Futurum analyst Keith Kirkpatrick noted, 'Enterprises are now demanding that every AI capability connect directly to revenue growth or margin improvement.' Autonomous Agents and Agentic AI surged 31.5% year-over-year as a technology priority, with 39% of executives reporting more than 10 agents deployed. Among those reporting productivity gains, 39% have seen productivity at least double. This data is critical for PE firms evaluating AI investments â the conversation has shifted from efficiency to EBITDA impact.",score:0.92},
  {id:4,rank:4,title:"VAST Data Raises $1B at $30B Valuation as AI Data Infrastructure Demand Surges",url:"https://www.calcalistech.com/ctechnews/article/byoqzk2ybx",source:"Calcalist Tech",published:"2026-03-11",category:"Data Infra",summary:"VAST Data closed a $1B round at a $30B valuation â the largest private funding round in Israeli high-tech history. The AI data storage platform is now critical infrastructure for AI workloads at hyperscaler scale.",overview:"VAST Data's massive round represents a more than threefold increase from its $9.1B valuation in 2023, reflecting soaring demand for unified AI data infrastructure. The company has developed a data storage and retrieval platform that eliminates data throughput and storage bottlenecks slowing advanced AI workloads. At VAST FWD 2026, CEO Renen Hallak laid out the vision for 'collapsing the stack' â unifying storage, database, and data pipeline layers into a single AI-optimized platform. Supermicro and VAST recently launched a joint Enterprise AI Data Platform with NVIDIA to accelerate AI factory deployments.",score:0.91},
  {id:5,rank:5,title:"Accenture: Agentic AI Is Redefining Private Equity in 2026",url:"https://www.accenture.com/gb-en/blogs/strategy/ai-redefining-private-equity",source:"Accenture",published:"2026-03-05",category:"PE & Growth",summary:"Accenture details how the smartest PE firms are deploying agentic AI to scan markets for acquisition targets, automate financial modeling, and monitor portfolio KPIs in real time. AI is now a standalone third value lever.",overview:"Accenture's analysis argues that AI has emerged as a standalone third value lever in private equity, joining financial engineering and operational excellence. In 2026, autonomous AI agents in PE are scanning markets for acquisition targets, automating financial modeling, and monitoring portfolio KPIs in real time. The report highlights enterprise orchestration layers as the key enabler for creating repeatable AI playbooks deployable across multiple portfolio companies. This 'AI cross-pollination' strategy is emerging as a powerful differentiator.",score:0.90},
  {id:6,rank:6,title:"Deloitte: State of AI in the Enterprise 2026 â One-Third Now Deeply Transforming with AI",url:"https://www.deloitte.com/global/en/issues/generative-ai/state-of-ai-in-enterprise.html",source:"Deloitte",published:"2026-03-01",category:"Biz Impact",summary:"Deloitte's survey of 3,235 leaders finds 34% of organizations are using AI to deeply transform â creating new products or reinventing processes. But only 20% report actual revenue growth from AI today, while 74% still aspire to it.",overview:"Deloitte's comprehensive report reveals a maturing but uneven landscape. One-third (34%) are deeply transforming with AI, another 30% are redesigning key processes, but 37% remain at surface level. The gap between aspiration and reality is stark: 66% report productivity gains, but only 20% have achieved actual revenue growth. For PE portfolio companies, this data suggests significant upside remains for firms that move beyond surface-level AI adoption.",score:0.88},
  {id:7,rank:7,title:"Nscale Secures $2B Series C from Nvidia for European AI Hyperscale Data Centers",url:"https://pipelineroad.com/news/20260306-march-opens-with-500m-rounds-in-space-tech-and-ai-infrastruc",source:"PipelineRoad",published:"2026-03-06",category:"Data Infra",summary:"London-based Nscale raised $2B in Series C funding backed by Nvidia, valuing the AI infrastructure startup at $14.6B. Plans to expand vertically integrated compute across Europe, North America, and Asia.",overview:"Nscale's $2B raise is one of Europe's largest-ever tech financings, reflecting the global race for AI compute infrastructure. The company builds and operates hyperscale data centers optimized for AI workloads. With $3-4 trillion estimated in AI infrastructure spending by decade's end, Nscale is positioning itself as a critical independent alternative to the hyperscaler oligopoly.",score:0.86},
  {id:8,rank:8,title:"Dialpad Advances Agentic AI Platform with Built-In ROI Validation and No-Code Agent Building",url:"https://www.businesswire.com/news/home/20260303482706/en/Dialpad-Advances-Agentic-AI-Platform-to-Empower-Enterprises-to-Move-from-Pilot-to-Production-with-Built-In-ROI-Validation-No-Code-Agent-Building-and-Governance",source:"BusinessWire",published:"2026-03-03",category:"Agentic AI",summary:"Dialpad's new platform features Skill Mining (identifies CX gaps), Proving Ground (validates AI agent ROI before deployment), and Agent Studio (no-code agent builder). 97% of their contact center customers already use AI.",overview:"Dialpad's Enterprise Connect 2026 announcements address the #1 barrier to enterprise AI adoption: proving ROI before committing. Skill Mining analyzes historical data to pinpoint CX gaps, while Proving Ground lets businesses test AI agent performance before going live. Agent Studio brings no-code agent creation to both digital and voice channels. With 97% of customers using AI and 775M+ AI Recaps generated, this represents the pilot-to-production shift defining enterprise AI in 2026.",score:0.85},
  {id:9,rank:9,title:"NTT DATA Unveils NVIDIA-Powered Enterprise AI Factories for Full-Stack AI Deployment",url:"https://www.nttdata.com/global/en/news/press-release/2026/march/031200",source:"NTT DATA",published:"2026-03-12",category:"Data Infra",summary:"NTT DATA launches NVIDIA-powered enterprise AI factories â full-stack, domain-specific solutions designed to help clients accelerate ROI by scaling enterprise AI and managing the full AI lifecycle end to end.",overview:"NTT DATA's enterprise AI factories represent the industrialization of AI deployment. These full-stack solutions combine NVIDIA hardware with domain-specific software layers. The approach addresses the 70% of organizations that discover their data infrastructure is fundamentally lacking only after launching AI initiatives. For PE portfolio companies, this model offers a faster path to AI-driven value creation without building proprietary infrastructure.",score:0.84},
  {id:10,rank:10,title:"CLA: AI and Private Equity in 2026 â 6 Predictions Redefining Value Creation",url:"https://www.claconnect.com/en/resources/blogs/private-equity/ai-and-private-equity-in-2026-6-predictions-redefining-value-creation",source:"CLA",published:"2026-02-28",category:"PE & Growth",summary:"CLA outlines six predictions for PE value creation through AI: from experimentation to operationalization, enterprise orchestration layers, AI cross-pollination across portfolios, and graduated autonomy in agent deployment.",overview:"CLA's framework covers the shift from fragmented AI experiments to intentional programs targeting EBITDA growth â predictive pricing, supply chain optimization, and customer analytics. Enterprise orchestration layers and graduated autonomy in AI agent deployment are described as universal patterns among successful PE-backed deployments.",score:0.83},
  {id:11,rank:11,title:"Nebius Receives $2B Strategic Investment from Nvidia for AI Cloud Infrastructure",url:"https://techstartups.com/2026/03/12/top-startup-and-tech-funding-news-march-12-2025/",source:"Tech Startups",published:"2026-03-12",category:"Data Infra",summary:"Amsterdam-based AI cloud infrastructure company Nebius received a $2B strategic equity investment from Nvidia, bringing total raised to $2.7B. Building sovereign AI cloud capacity across multiple geographies.",overview:"Nebius's $2B from Nvidia is part of the chipmaker's strategy to ensure sufficient GPU cloud capacity globally. The company provides AI cloud infrastructure for the sovereign AI movement where nations and enterprises seek compute independence. Nvidia is systematically investing in infrastructure providers to ensure the AI compute supply chain scales to match demand.",score:0.82},
  {id:12,rank:12,title:"Galileo Launches Agent Control: Open-Source Governance for Enterprise AI Agents",url:"https://bostoninstituteofanalytics.org/blog/agentic-ai-news-roundup-7-13-march-2026-market-growth-enterprise-adoption-new-ai-agents/",source:"BIA / Galileo",published:"2026-03-13",category:"Agentic AI",summary:"Galileo launched Agent Control, an open-source governance layer establishing universal standards for AI agent behavior. Enables companies to set and enforce conduct rules from a single management platform.",overview:"As enterprises deploy more AI agents, governance becomes critical. Agent Control addresses 'agent sprawl' â the proliferation of siloed, insecure agents. Gartner projects 40% of enterprise applications will include AI agents by end of 2026. For PE firms, agent governance is both a risk management imperative and an investment opportunity.",score:0.81},
  {id:13,rank:13,title:"Prediction Markets Say Google Wins 2026 AI Race; OpenAI IPO Odds at 33%",url:"https://www.thedeepview.com/articles/prediction-markets-google-will-win-2026-ai-race",source:"The Deep View",published:"2026-01-02",category:"AI Trends",summary:"Polymarket gives Google a 74% chance of having the best AI model by end of March 2026. OpenAI IPO gets only 33% odds. Perplexity (41%), Anthropic (36%), and OpenAI (29%) all have meaningful acquisition probabilities.",overview:"Prediction markets provide a data-driven view of the AI competitive landscape. Google's 74% probability of leading AI models by end of March reflects strong momentum. More interesting for PE: Polymarket assigns 41% acquisition probability to Perplexity, 36% to Anthropic, and 29% to OpenAI by end of 2026. These probabilities suggest significant M&A activity ahead.",score:0.80,deepView:true},
  {id:14,rank:14,title:"TechCrunch: The Billion-Dollar Infrastructure Deals Powering the AI Boom",url:"https://techcrunch.com/2026/02/28/billion-dollar-infrastructure-deals-ai-boom-data-centers-openai-oracle-nvidia-microsoft-google-meta/",source:"TechCrunch",published:"2026-02-28",category:"Data Infra",summary:"February 2026 was the largest single month of startup funding ever at $189B+ globally. At least 17 U.S. AI startups raised $100M+ rounds. Hyperscalers plan $700B in data center spending in 2026.",overview:"The staggering scale of AI capital flows: February 2026 closed with $195B+ in tracked AI capital, making it the most consequential month in venture finance history. Capital concentrates around infrastructure, scale, and defensibility â fewer startups funded but with significantly larger rounds.",score:0.79},
  {id:15,rank:15,title:"Deloitte Canada: Five AI-Focused Levers for PE Portfolio Company Value Creation",url:"https://www.deloitte.com/ca/en/services/consulting/perspectives/unleashing-portfolio-potential-five-ai-focused-levers-for-private-equity-value-creation.html",source:"Deloitte",published:"2026-02-20",category:"PE & Growth",summary:"Deloitte identifies five AI levers for PE value creation: talent development, revenue growth, margin expansion, product differentiation, and asset protection. Case studies show 7% indirect spend savings and $5M margin gains per quarter.",overview:"Practical framework: AI-driven price benchmarking saved 7% across indirect spend in 10 weeks. Dynamic pricing generated $5M in margin in one quarter. Industrial mid-cap cut unplanned downtime by 18%. B2B distribution boosted sales productivity 15% with AI lead scoring. Software development time cut 50%+.",score:0.78},
  {id:16,rank:16,title:"Google Cloud: A Blueprint for Enterprise-Wide Agentic AI Transformation",url:"https://hbr.org/sponsored/2026/02/a-blueprint-for-enterprise-wide-agentic-ai-transformation",source:"HBR / Google Cloud",published:"2026-02-15",category:"Agentic AI",summary:"Google Cloud Consulting's HBR blueprint warns against 'agent sprawl' â the costly proliferation of siloed AI agents. Advocates for unified enterprise-wide strategy with graduated autonomy.",overview:"Published in HBR, this blueprint addresses the most common enterprise AI failure: decentralized development without unifying strategy. Graduated autonomy â from human approval to notification to fully autonomous â is prescribed. 70% of organizations discover data infrastructure gaps only after launching AI initiatives.",score:0.77},
  {id:17,rank:17,title:"PwC 2026 AI Predictions: Top-Down Strategy Beats Grassroots â The End of Scattered AI Pilots",url:"https://www.pwc.com/us/en/tech-effect/ai-analytics/ai-predictions.html",source:"PwC",published:"2026-03-01",category:"Biz Impact",summary:"PwC argues for enterprise-wide AI strategy over crowdsourced initiatives. Companies that let AI bubble up from grassroots rarely achieve transformation. Front-runners pick focused spots for AI investment.",overview:"Strategy trumps experimentation. Ground-up AI approaches rarely match enterprise priorities or lead to transformation. Front-runners adopt enterprise-wide strategies with senior leadership picking spots for focused AI investment. Organizations see compounding ROI between months 18 and 36. AI transformation requires executive ownership, not bottom-up tinkering.",score:0.76},

const catClass=c=>{const m={"Agentic AI":"cat-agentic","PE & Growth":"cat-pe","Data Infra":"cat-infra","AI Trends":"cat-trends","Biz Impact":"cat-biz"};return m[c]||"cat-trends"};
function render(filter){
  const el=document.getElementById("cards");
  const filtered=filter==="all"?articles:articles.filter(a=>a.category===filter);
  el.innerHTML=filtered.map(a=>`
    <div class="card" data-category="${a.category}" onclick="toggle(${a.id})">
      <div class="card-header">
        <div class="rank-badge ${a.rank<=3?'top3':''}">${a.rank}</div>
        <div class="card-content">
          <div class="card-meta">
            <span class="category-tag ${catClass(a.category)}">${a.category}</span>
            <span class="source-label">${a.source} Â· ${a.published}</span>
            ${a.deepView?'<span class="deep-view-badge">â¡ The Deep View</span>':''}
          </div>
          <a class="card-title" href="${a.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${a.title}</a>
          <div class="card-summary">${a.summary}</div>
          <div class="card-footer">
            <div class="score-bar"><div class="score-bar-fill" style="width:${a.score*100}%"></div></div>
            <span class="score-label">${(a.score*100).toFixed(0)}%</span>
            <div class="actions"><button class="btn-thumbs-down" onclick="thumbsDown('${a.id}', this)" title="Not interested"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg></button></div>
          </div>
          <div class="card-overview" id="overview-${a.id}">${a.overview}</div>
          <div class="expand-hint">tap to expand â¾</div>
        </div>
      </div>
    </div>
  `).join("");
}
function toggle(id){
  const el=document.getElementById("overview-"+id);
  if(el)el.classList.toggle("open");
}
document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));

  });
});
