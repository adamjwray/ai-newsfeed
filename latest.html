const articles = [
{"id":1,"rank":1,"title":"Dialpad Advances Agentic AI Platform with Built-In ROI Validation and No-Code Agent Building","url":"https://www.businesswire.com/news/home/20260303482706/en/Dialpad-Advances-Agentic-AI-Platform-to-Empower-Enterprises-to-Move-from-Pilot-to-Production-with-Built-In-ROI-Validation-No-Code-Agent-Building-and-Governance","source":"BusinessWire","published":"2026-03-03","category":"Agentic AI","summary":"Dialpad launches enterprise agentic AI platform with built-in ROI validation, no-code agent building, and governance â enabling enterprises to move from pilot to production with measurable outcomes.","overview":"Dialpad's platform represents the maturation of agentic AI from experimentation to production-grade deployment. The inclusion of built-in ROI validation directly addresses the #1 concern PE firms have with AI investments: proving measurable returns. The no-code agent builder democratizes AI deployment across portfolio companies, while embedded governance satisfies enterprise compliance requirements. This is exactly the kind of tool that could drive margin expansion across a PE portfolio.","score":0.94},
{"id":2,"rank":2,"title":"Enterprise AI ROI Shifts as Agentic Priorities Surge 31.5% Year-Over-Year","url":"https://futurumgroup.com/press-release/enterprise-ai-roi-shifts-as-agentic-priorities-surge/","source":"Futurum Group","published":"2026-03-10","category":"Agentic AI","summary":"Direct financial ROI nearly doubled to 21.7% as the primary AI metric, while productivity gains fell from 23.8% to 18%. Agentic AI surged 31.5% as a top priority.","overview":"This is a landmark shift in how enterprises justify AI spend. The move from productivity metrics to direct revenue/margin impact signals AI has matured from a cost-center tool to a P&L driver. For PE-backed companies, this means AI investments can now be directly tied to EBITDA improvement. The 31.5% surge in agentic AI as a priority confirms that autonomous agents are no longer experimental â they're becoming core operational infrastructure.","score":0.93},
{"id":3,"rank":3,"title":"Anthropic Named Most Disruptive Company â Claude Enters Pentagon and Enterprise","url":"https://time.com/article/2026/03/11/anthropic-claude-disruptive-company-pentagon/","source":"TIME","published":"2026-03-11","category":"AI Trends","summary":"TIME profiles Anthropic as the most disruptive company in the world, highlighting Claude's expansion into Pentagon contracts, enterprise deployments, and MCP becoming an industry standard.","overview":"Anthropic's trajectory from safety-focused research lab to the Pentagon's AI partner of choice illustrates how responsible AI is winning enterprise trust. MCP's adoption by OpenAI, Google, and Microsoft as the universal standard for agent-to-tool communication is a massive moat. For PE portfolio companies evaluating AI infrastructure, MCP compatibility is becoming table stakes. Anthropic's $380B valuation and government contracts signal a durable competitive position.","score":0.91},
{"id":4,"rank":4,"title":"OpenAI Closes Historic $110B Round â Plans Enterprise Agent Platform with AWS and Nvidia","url":"https://news.crunchbase.com/venture/record-setting-global-funding-february-2026-openai-anthropic/","source":"Crunchbase","published":"2026-03-04","category":"Data Infra","summary":"OpenAI raises $110B from Amazon ($50B), Nvidia ($30B), and SoftBank ($30B) at $730B valuation. Plans include stateful cloud services, enterprise agent platform, and custom hardware.","overview":"The sheer scale of this raise reshapes the competitive landscape. OpenAI is building an end-to-end enterprise stack â compute, models, agent platform, and cloud services â competing directly with hyperscalers. For PE firms, this signals AI infrastructure is consolidating around massive players. Portfolio companies need to evaluate vendor lock-in risk. The AWS partnership means OpenAI agents will be deeply embedded in enterprise cloud environments, creating switching costs that matter for exit valuations.","score":0.90},
{"id":5,"rank":5,"title":"Lightspeed and Andreessen Back $4.2B AI Data Center Supplier Nexthop AI","url":"https://www.bloomberg.com/news/articles/2026-03-10/lightspeed-andreessen-back-4-2-billion-ai-data-center-supplier","source":"Bloomberg","published":"2026-03-10","category":"Data Infra","summary":"Nexthop AI raises $500M led by Lightspeed at $4.2B valuation, joining the surge of infrastructure investments as hyperscalers plan $700B in data center spending in 2026.","overview":"The AI infrastructure gold rush continues with Nexthop joining VAST Data ($30B), Nscale ($14.6B), and others in capturing massive capital flows. With hyperscalers planning $700B in data center spending this year, the infrastructure layer is where the most defensible value is created. For PE firms, this signals opportunities in infrastructure-adjacent companies â cooling, power management, networking â that benefit from this capex wave without model risk.","score":0.89},
{"id":6,"rank":6,"title":"AI and Private Equity in 2026: 6 Predictions Redefining Value Creation","url":"https://www.claconnect.com/en/resources/blogs/private-equity/ai-and-private-equity-in-2026-6-predictions-redefining-value-creation","source":"CLA","published":"2026-03-01","category":"PE & Growth","summary":"AI emerges as a standalone third value lever in PE alongside financial engineering and operational excellence. Autonomous agents will scan markets for targets, automate modeling, and monitor KPIs.","overview":"This is the clearest articulation yet of AI as a distinct PE value creation lever. The shift from 'nice to have' to core EBITDA driver is now consensus. Autonomous agents handling deal sourcing, financial modeling, and portfolio monitoring represents a fundamental change in how operating partners work. Firms that build repeatable AI playbooks will command premium valuations and attract better LP capital.","score":0.88},

{"id":9,"rank":9,"title":"EU Endorses First International Treaty on AI Governance","url":"https://www.febis.org/2026/03/12/eu-endorses-first-international-treaty-on-ai-governance-what-it-means-for-the-future-of-trusted-ai/","source":"FEBIS","published":"2026-03-12","category":"AI Trends","summary":"European Parliament approves the first legally binding international AI treaty (455-101-74) with requirements for transparency, auditability, and rights protection.","overview":"A watershed moment for global AI governance. The first binding international AI treaty establishes a compliance floor for any company selling into European markets. Companies with built-in compliance will have a moat, while those without face regulatory risk. For PE firms, this accelerates AI governance as a due diligence factor and creates opportunities in compliance technology.","score":0.85},
{"id":10,"rank":10,"title":"Deloitte State of AI 2026: One-Third of Enterprises Now Using AI for Deep Transformation","url":"https://www.deloitte.com/global/en/issues/generative-ai/state-of-ai-in-enterprise.html","source":"Deloitte","published":"2026-03-01","category":"Biz Impact","summary":"Deloitte surveys 3,235 leaders: 34% using AI for deep transformation, 30% redesigning processes, 37% at surface-level optimization. Only 20% report revenue growth vs. 74% who aspire to it.","overview":"The bifurcation in AI maturity creates a two-speed economy. The revenue growth gap (20% today vs. 74% aspirational) is the opportunity: acquiring companies stuck in optimization and applying a proven AI transformation playbook can unlock significant value. The 66% reporting productivity gains confirms the floor, while the revenue gap shows the ceiling.","score":0.84},
{"id":11,"rank":11,"title":"World Labs Raises $1B as VCs Look Beyond LLMs to Spatial Intelligence","url":"https://www.thedeepview.com/articles/world-labs-raises-usd1b-as-vcs-look-beyond-llms","source":"The Deep View","published":"2026-02-18","category":"AI Trends","summary":"Fei-Fei Li's World Labs raises $1B as VCs diversify beyond language models into spatial intelligence and world models, signaling a new frontier in AI investment.","overview":"The Deep View highlights a critical inflection: VC is diversifying beyond LLMs into spatial intelligence. World Labs' $1B raise confirms the next wave of AI value creation may come from understanding the physical world â robotics, autonomous systems, 3D environments. For growth equity, this opens logistics, manufacturing, construction, and real estate as new AI-driven sectors.","score":0.83},
{"id":12,"rank":12,"title":"How 1,000+ Customer Calls Shaped a Breakout Enterprise AI Startup","url":"https://techcrunch.com/2026/03/05/how-1000-customer-calls-shaped-a-breakout-enterprise-ai-startup/","source":"TechCrunch","published":"2026-03-05","category":"Biz Impact","summary":"TechCrunch profiles how deep customer discovery â over 1,000 calls â built a product that actually solves enterprise problems, a masterclass in product-market fit.","overview":"This story is a playbook for enterprise AI GTM. The emphasis on customer discovery over technology-first building separates successful AI companies from the 40%+ that Gartner predicts will fail. For PE portfolio companies, this validates customer-obsessed product development as a leading indicator of competitive advantage and capital efficiency.","score":0.82},
{"id":13,"rank":13,"title":"VAST Data Raises $500M at $30B Valuation to Unify AI Data Infrastructure","url":"https://aifundingtracker.com/top-50-ai-startups/","source":"AI Funding Tracker","published":"2026-03-01","category":"Data Infra","summary":"VAST Data raises $500M at $30B valuation, building unified data infrastructure that eliminates throughput and storage bottlenecks for enterprise AI deployment.","overview":"VAST Data's valuation reflects conviction that data infrastructure is the critical AI bottleneck. As companies deploy larger models and agents, demand for high-throughput data systems is exploding. VAST's unified approach eliminates fragmentation, directly addressing the #1 technical barrier to scaling AI. Data infrastructure offers PE firms infrastructure-like returns with strong recurring revenue.","score":0.81},
{"id":14,"rank":14,"title":"Zendesk Acquires Forethought to Build Autonomous Customer Service AI","url":"https://nationaltoday.com/us/ca/san-francisco/news/2026/03/11/zendesk-acquires-pioneering-customer-service-ai-startup-forethought/","source":"San Francisco Today","published":"2026-03-11","category":"Agentic AI","summary":"Zendesk acquires AI startup Forethought to integrate autonomous customer service agents, self-improving AI, and voice automation into its platform.","overview":"This illustrates the buy-vs-build dynamic in enterprise SaaS. Zendesk acquiring AI capabilities rather than building them is a pattern that will accelerate M&A. AI-native capabilities command premium multiples. Incumbent SaaS platforms without embedded AI face existential competitive pressure.","score":0.80},
{"id":15,"rank":15,"title":"Nscale Raises $2B Series C for Nvidia-Backed European AI Infrastructure","url":"https://techstartups.com/2026/03/09/top-startup-and-tech-funding-news-march-9-2025/","source":"Tech Startups","published":"2026-03-09","category":"Data Infra","summary":"London-based Nscale secures $2B Series C at $14.6B valuation for hyperscale AI data centers â one of Europe's largest tech financings ever.","overview":"AI infrastructure is becoming a global opportunity. European AI sovereignty and data residency requirements create demand for non-US providers. For PE firms with global portfolios, this opens infrastructure investment in Europe and Asia where regulatory tailwinds support domestic AI capacity. Nvidia backing adds strategic validation.","score":0.79},
{"id":16,"rank":16,"title":"MCP Becomes Industry Standard: 97M Monthly Downloads as OpenAI, Google, Microsoft Adopt","url":"https://thenewstack.io/why-the-model-context-protocol-won/","source":"The New Stack","published":"2026-03-06","category":"AI Trends","summary":"Anthropic's MCP hits 97M monthly SDK downloads and 10,000+ active servers after adoption by every major AI platform and donation to the Linux Foundation.","overview":"MCP's trajectory from internal experiment to universal standard is one of the most significant AI infrastructure developments. With 97M monthly downloads, MCP is becoming the TCP/IP of agentic AI. For PE portfolio companies, MCP compatibility is now a requirement. Companies building MCP-native tooling represent a compelling investment thesis.","score":0.78},
{"id":17,"rank":17,"title":"B2B SaaS Trends March 2026: AI Agents Power the Rise of Micro-Unicorns","url":"https://blog.mean.ceo/b2b-saas-trends-march-2026/","source":"Mean CEO","published":"2026-03-01","category":"PE & Growth","summary":"Agentic AI enables micro-unicorns â unicorn valuations with small teams via AI across product, GTM, and ops. NRR of 120-130% becomes the defining growth metric.","overview":"Micro-unicorns achieving unicorn outcomes with dozens of employees represent extreme capital efficiency â exactly what growth equity prizes. The shift to NRR (120-130% for top performers) validates retention over acquisition in the AI era. Building AI-powered customer success playbooks driving NRR above 120% should be a top operating partner priority.","score":0.77},

const tagClass = {"Agentic AI":"tag-agentic","PE & Growth":"tag-pe","Data Infra":"tag-infra","AI Trends":"tag-trends","Biz Impact":"tag-biz"};

function render(filter){
  const c = document.getElementById('cards');
  c.innerHTML = '';
  const filtered = filter === 'all' ? articles : articles.filter(a => a.category === filter);
  filtered.forEach(a => {
    const isTop3 = a.rank <= 3;
    c.innerHTML += `
    <div class="card" data-cat="${a.category}">
      <div class="card-header">
        <div class="rank-badge ${isTop3?'top3':''}">${a.rank}</div>
        <div class="card-meta">
          <div class="card-tags">
            <span class="tag ${tagClass[a.category]||''}">${a.category}</span>
            <span class="source-label">${a.source} Â· ${a.published}</span>
          </div>
          <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${a.title}</a></div>
          <div class="card-summary">${a.summary}</div>
          <div class="card-footer">
            <div class="score-bar"><div class="score-bar-fill" style="width:${a.score*100}%"></div></div>
            <span class="score-label">${(a.score*100).toFixed(0)}%</span>
            <div class="actions"><button class="btn-thumbs-down" onclick="thumbsDown('${a.id || i}', this)" title="Not interested"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg></button></div>
          </div>
          <button class="expand-btn" onclick="this.nextElementSibling.classList.toggle('show');this.textContent=this.nextElementSibling.classList.contains('show')?'â² Hide analysis':'â¼ Read analysis'">â¼ Read analysis</button>
          <div class="overview">${a.overview}</div>
        </div>
      </div>
    </div>`;
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));

});

render('all');
</script>
