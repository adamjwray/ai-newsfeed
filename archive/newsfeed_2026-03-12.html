<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Newsfeed — March 12, 2026</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-hover: #222633;
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,0.15);
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --border: #2d3148;
    --green: #22c55e;
    --amber: #f59e0b;
    --rose: #f43f5e;
    --cyan: #06b6d4;
    --purple: #a855f7;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; line-height:1.6; }
  .container { max-width:900px; margin:0 auto; padding:20px 16px; }
  header { text-align:center; padding:40px 0 30px; }
  header h1 { font-size:2rem; font-weight:700; background:linear-gradient(135deg,#6366f1,#06b6d4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:4px; }
  header .subtitle { color:var(--text-dim); font-size:0.95rem; }
  header .date { color:var(--accent); font-weight:600; font-size:0.9rem; margin-top:6px; }
  .filters { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:20px 0 30px; }
  .filter-btn { background:var(--card); border:1px solid var(--border); color:var(--text-dim); padding:6px 16px; border-radius:20px; cursor:pointer; font-size:0.85rem; transition:all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .article-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px 24px; margin-bottom:16px; cursor:pointer; transition:all 0.2s; position:relative; }
  .article-card:hover { background:var(--card-hover); border-color:var(--accent); transform:translateY(-1px); box-shadow:0 4px 20px var(--accent-glow); }
  .article-card .rank { position:absolute; top:20px; left:-12px; width:28px; height:28px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:700; color:#fff; }
  .article-card .meta { display:flex; gap:10px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
  .category-tag { font-size:0.75rem; padding:2px 10px; border-radius:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
  .cat-agentic { background:rgba(99,102,241,0.15); color:#818cf8; }
  .cat-pe { background:rgba(34,197,94,0.15); color:#4ade80; }
  .cat-data { background:rgba(6,182,212,0.15); color:#22d3ee; }
  .cat-trends { background:rgba(168,85,247,0.15); color:#c084fc; }
  .cat-biz { background:rgba(245,158,11,0.15); color:#fbbf24; }
  .source-label { font-size:0.8rem; color:var(--text-dim); }
  .article-card h3 { font-size:1.05rem; font-weight:600; margin-bottom:6px; color:var(--text); }
  .article-card h3 a { color:inherit; text-decoration:none; }
  .article-card h3 a:hover { color:var(--accent); }
  .article-card .summary { font-size:0.88rem; color:var(--text-dim); margin-bottom:10px; }
  .article-card .overview { font-size:0.85rem; color:var(--text-dim); display:none; padding:12px; background:rgba(99,102,241,0.05); border-radius:8px; border-left:3px solid var(--accent); margin-top:10px; }
  .article-card.expanded .overview { display:block; }
  .score-bar { display:flex; align-items:center; gap:8px; margin-top:8px; }
  .score-bar .bar { flex:1; height:4px; background:var(--border); border-radius:2px; overflow:hidden; max-width:120px; }
  .score-bar .bar .fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--cyan)); border-radius:2px; }
  .score-bar .val { font-size:0.8rem; color:var(--accent); font-weight:600; }
  .expand-hint { font-size:0.75rem; color:var(--text-dim); opacity:0.6; margin-top:4px; }
  footer { text-align:center; padding:40px 0 20px; color:var(--text-dim); font-size:0.85rem; }
  footer a { color:var(--accent); text-decoration:none; }
  @media(max-width:600px) {
    .container { padding:12px; }
    header h1 { font-size:1.5rem; }
    .article-card { padding:16px; }
    .article-card .rank { left:-8px; width:24px; height:24px; font-size:0.7rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>⚡ AI Newsfeed</h1>
    <div class="subtitle">Curated daily for Adam · Top 20 stories ranked by relevance</div>
    <div class="date">Thursday, March 12, 2026</div>
  </header>
  <div class="filters">
    <button class="filter-btn active" data-cat="all">All (20)</button>
    <button class="filter-btn" data-cat="agentic">Agentic AI</button>
    <button class="filter-btn" data-cat="pe">PE & Growth</button>
    <button class="filter-btn" data-cat="data">Data Infra</button>
    <button class="filter-btn" data-cat="trends">AI Trends</button>
    <button class="filter-btn" data-cat="biz">Biz Impact</button>
  </div>
  <div id="articles"></div>
  <footer>
    AI Newsfeed · Curated daily for Adam<br>
    <a href="mailto:adamjwray@gmail.com">adamjwray@gmail.com</a>
  </footer>
</div>
<script>
const articles = [
  {rank:1,title:"Microsoft Launches Copilot Cowork Powered by Anthropic's Claude",url:"https://techstartups.com/2026/03/09/microsoft-taps-anthropics-claude-to-power-copilot-cowork-autonomous-ai-agents-in-a-blow-to-openai/",source:"Tech Startups",cat:"agentic",catLabel:"Agentic AI",published:"Mar 9",summary:"Microsoft launched Copilot Cowork, a cloud-based AI agent powered by Anthropic\u2019s Claude that executes multi-step tasks across M365 for enterprise users at $30/user/month.",overview:"Microsoft\u2019s launch of Copilot Cowork marks a pivotal moment in the enterprise AI race. Built on a $30B Azure compute deal with Anthropic, the product deploys Claude-powered agents that autonomously execute complex workflows across Microsoft 365. For PE-backed companies, this validates the agentic AI thesis: autonomous agents embedded in enterprise productivity suites will drive measurable operational efficiency at scale.",score:0.94},
  {rank:2,title:"Anthropic Donates MCP to Agentic AI Foundation Under Linux Foundation",url:"https://www.anthropic.com/news/donating-the-model-context-protocol-and-establishing-of-the-agentic-ai-foundation",source:"Anthropic",cat:"agentic",catLabel:"Agentic AI",published:"Mar 10",summary:"Anthropic donated MCP to the AAIF, co-founded with Block and OpenAI, backed by Google, Microsoft, AWS, Cloudflare, and Bloomberg. MCP now has 10,000+ active public servers.",overview:"The Model Context Protocol has evolved from Anthropic\u2019s internal experiment to the de facto standard for agentic AI interoperability. By donating it to the Linux Foundation-backed AAIF, Anthropic is positioning MCP as the TCP/IP of the agent era \u2014 an open standard that reduces vendor lock-in while accelerating enterprise adoption.",score:0.93},
  {rank:3,title:"Enterprise AI ROI Shifts as Agentic Priorities Surge",url:"https://futurumgroup.com/press-release/enterprise-ai-roi-shifts-as-agentic-priorities-surge/",source:"Futurum Group",cat:"agentic",catLabel:"Agentic AI",published:"Mar 6",summary:"Survey of 830 IT decision-makers: agentic AI is #1 tech priority (17.1%, up 31.5% YoY). Direct financial impact nearly doubled to 21.7% as primary ROI metric.",overview:"The clearest signal yet that enterprise AI buyers have matured beyond \u2018productivity theater.\u2019 The shift from measuring productivity gains to demanding direct P&L impact validates what growth equity investors have been underwriting: AI value creation must show up in revenue growth and margin expansion.",score:0.92},
  {rank:4,title:"Nexthop AI Raises $500M at $4.2B Valuation for AI Data Center Networking",url:"https://finance.yahoo.com/news/nexthop-ai-accelerates-hypergrowth-oversubscribed-124500734.html",source:"Yahoo Finance",cat:"data",catLabel:"Data Infra",published:"Mar 10",summary:"Oversubscribed $500M Series B led by Lightspeed, with a16z, Altimeter, and Kleiner Perkins. Nexthop builds disaggregated spine architecture for AI data centers.",overview:"Nexthop\u2019s massive raise underscores that the AI infrastructure build-out is far from over. The $4.2B valuation on a Series B signals that AI infrastructure remains the highest-conviction investment theme, with networking companies commanding premium multiples as enterprises scale from pilot to production.",score:0.90},
  {rank:5,title:"Nscale Raises $2B Series C at $14.6B Valuation, Backed by Nvidia",url:"https://www.cnbc.com/2026/03/09/nscale-ai-data-center-nvidia-raise.html",source:"CNBC",cat:"data",catLabel:"Data Infra",published:"Mar 9",summary:"Europe\u2019s largest-ever tech financing: UK-based Nscale closed $2B at $14.6B with Nvidia backing. Building vertically integrated AI infrastructure across GPU compute, networking, and orchestration.",overview:"Nscale\u2019s record-breaking European raise signals that the AI compute arms race is globalizing. The vertically integrated model validates the thesis that compute infrastructure providers can command SaaS-like valuations when they own the full stack.",score:0.88},
  {rank:6,title:"AI and Private Equity in 2026: 6 Predictions Redefining Value Creation",url:"https://www.claconnect.com/en/resources/blogs/private-equity/ai-and-private-equity-in-2026-6-predictions-redefining-value-creation",source:"CLA Connect",cat:"pe",catLabel:"PE & Growth",published:"Mar 3",summary:"84% of PE firms have appointed Chief AI Officers. Two-thirds expect to invest over 25% of budget in AI. Six predictions include repeatable AI playbooks and \u2018govern before you scale.\u2019",overview:"This report crystallizes the PE industry\u2019s AI maturation: the era of fragmented experiments is over. With 84% of firms appointing CAIOs and AI budgets surging past 25%, the opportunity lies in creating repeatable AI playbooks deployable across portfolio companies.",score:0.87},
  {rank:7,title:"Lio Raises $30M from a16z to Automate Enterprise Procurement with AI Agents",url:"https://techcrunch.com/2026/03/05/lio-ai-series-a-a16z-30m-raise-automate-enterprise-procurement/",source:"TechCrunch",cat:"agentic",catLabel:"Agentic AI",published:"Mar 5",summary:"AI agents that execute procurement workflows autonomously. One global manufacturer automated 75% of outsourced procurement within six months.",overview:"Lio represents the archetype of agentic AI value: replacing entire outsourced workflows, not just augmenting them. A 75% automation rate on procurement translates directly to gross margin expansion for portfolio companies.",score:0.86},
  {rank:8,title:"Dialpad Advances Agentic AI Platform with Built-In ROI Validation",url:"https://www.businesswire.com/news/home/20260303482706/en/Dialpad-Advances-Agentic-AI-Platform-to-Empower-Enterprises-to-Move-from-Pilot-to-Production-with-Built-In-ROI-Validation-No-Code-Agent-Building-and-Governance",source:"BusinessWire",cat:"agentic",catLabel:"Agentic AI",published:"Mar 3",summary:"Debuted at Enterprise Connect 2026 with no-code agent building and ROI validation before deployment \u2014 bridging the pilot-to-production gap.",overview:"Dialpad\u2019s \u2018validate before you deploy\u2019 approach addresses the biggest enterprise objection to agentic AI: uncertainty about ROI. This is especially relevant for PE portfolio companies that need measurable AI impact within typical 3-5 year hold periods.",score:0.84},
  {rank:9,title:"Deloitte: State of AI in the Enterprise 2026",url:"https://www.deloitte.com/global/en/issues/generative-ai/state-of-ai-in-enterprise.html",source:"Deloitte",cat:"biz",catLabel:"Biz Impact",published:"Mar 1",summary:"34% of organizations using AI to deeply transform business models. 30% redesigning key processes. Two-thirds report productivity gains.",overview:"The finding that one-third are already creating new products or reinventing core processes suggests the window for competitive advantage through AI adoption is narrowing. Portfolio companies that haven\u2019t moved beyond productivity gains risk being left behind.",score:0.83},
  {rank:10,title:"AI War Fakes Are Fooling Millions as X Cracks Down",url:"https://www.thedeepview.com/newsletter/ai-war-fakes-are-fooling-millions",source:"The Deep View",cat:"trends",catLabel:"AI Trends",published:"Mar 9",summary:"AI-generated fake videos of U.S.\u2013Iran conflict flooding social media. X suspended monetization for 90 days for undisclosed AI content of armed conflicts.",overview:"The weaponization of AI-generated content during active conflicts highlights urgent need for AI content authentication infrastructure. This creates opportunities in AI detection, digital provenance, and content verification verticals.",score:0.82},
  {rank:11,title:"EY: PE\u2019s AI Evolution into Differentiated Growth",url:"https://www.ey.com/en_us/insights/private-equity/us-private-equity-ai-insights",source:"EY",cat:"pe",catLabel:"PE & Growth",published:"Mar 4",summary:"84% of PE funds expect AI to have significant transformative impact. AI emerging as standalone third value lever alongside financial engineering and operational excellence.",overview:"EY\u2019s framework elevates AI from a tool to a strategic value lever. The \u2018cross-pollination\u2019 concept \u2014 investing in AI-native companies and deploying their tech across other portfolio companies \u2014 creates a flywheel of returns.",score:0.81},
  {rank:12,title:"How 1,000+ Customer Calls Shaped a Breakout Enterprise AI Startup",url:"https://techcrunch.com/2026/03/05/how-1000-customer-calls-shaped-a-breakout-enterprise-ai-startup/",source:"TechCrunch",cat:"biz",catLabel:"Biz Impact",published:"Mar 5",summary:"Deep dive into how relentless customer discovery \u2014 1,000+ calls \u2014 built product-market fit before scaling. Solving real workflow pain over AI hype.",overview:"The AI startups that win aren\u2019t the ones with the best models, but the ones that most deeply understand enterprise workflows. For portfolio company operators evaluating AI vendors, look for companies that built from customer pain backward.",score:0.80},
  {rank:13,title:"Qualcomm Envisions AI Wearables as a Body Area Network",url:"https://www.thedeepview.com/newsletter/ai-war-fakes-are-fooling-millions",source:"The Deep View",cat:"trends",catLabel:"AI Trends",published:"Mar 9",summary:"At MWC, Qualcomm presented a vision where AI wearables work together as an interconnected body area network rather than standalone devices.",overview:"Qualcomm\u2019s body area network concept points to the next frontier of AI hardware: distributed, context-aware computing that follows users across environments, creating new infrastructure and software opportunities.",score:0.78},
  {rank:14,title:"Trump Signs Executive Order Challenging State AI Laws",url:"https://www.paulhastings.com/insights/client-alerts/president-trump-signs-executive-order-challenging-state-ai-laws",source:"Paul Hastings",cat:"trends",catLabel:"AI Trends",published:"Mar 1",summary:"EO directs federal agencies to preempt state AI regulations by mid-March 2026, including FTC action on bias mitigation and FCC exploration of federal reporting standards.",overview:"Federal preemption of state AI laws is a significant regulatory simplification. With March deadlines for FTC (Mar 11) and FCC (Mar 16) action, companies face a rapidly shifting compliance landscape. Track these milestones closely.",score:0.77},
  {rank:15,title:"The Billion-Dollar Infrastructure Deals Powering the AI Boom",url:"https://techcrunch.com/2026/02/28/billion-dollar-infrastructure-deals-ai-boom-data-centers-openai-oracle-nvidia-microsoft-google-meta/",source:"TechCrunch",cat:"data",catLabel:"Data Infra",published:"Feb 28",summary:"February 2026 closed as the largest single month of startup funding ever at $189B globally, driven primarily by AI infrastructure investments.",overview:"Record $189B in global startup funding confirms we\u2019re in the infrastructure phase of the AI cycle. Growth equity investors should monitor the ratio of infrastructure spend to application revenue closely.",score:0.76},
  {rank:16,title:"Yann LeCun Rethinks AGI, Proposes \u2018Superhuman Adaptable Intelligence\u2019",url:"https://www.thedeepview.com/newsletter/ai-war-fakes-are-fooling-millions",source:"The Deep View",cat:"trends",catLabel:"AI Trends",published:"Mar 9",summary:"Meta\u2019s chief AI scientist challenges AGI fixation, proposing \u2018superhuman adaptable intelligence\u2019 as a more practical goal focused on adaptability.",overview:"LeCun\u2019s reframing shifts the conversation from sci-fi timelines to practical capability milestones. \u2018Superhuman adaptable intelligence\u2019 maps to concrete enterprise use cases and helps cut through vendor hype.",score:0.75},
  {rank:17,title:"Glean Is Building the Enterprise AI Layer Beneath the Interface",url:"https://techcrunch.com/2026/02/15/the-enterprise-ai-land-grab-is-on-glean-is-building-the-layer-beneath-the-interface/",source:"TechCrunch",cat:"agentic",catLabel:"Agentic AI",published:"Feb 15",summary:"Glean positioning as the enterprise AI knowledge layer connecting all data sources, enabling AI agents to access institutional knowledge across systems.",overview:"The \u2018picks and shovels\u2019 play for the agentic era: whoever controls the enterprise knowledge layer controls the context that makes agents useful. For PE-backed companies with fragmented data, Glean-style platforms offer a practical path to AI readiness.",score:0.74},
  {rank:18,title:"PwC 2026 AI Predictions: From Experimentation to Enterprise Transformation",url:"https://www.pwc.com/us/en/tech-effect/ai-analytics/ai-predictions.html",source:"PwC",cat:"biz",catLabel:"Biz Impact",published:"Mar 1",summary:"PwC recommends a centralized \u2018AI studio\u2019 model combining reusable tech components, use case assessment, sandboxing, and deployment protocols.",overview:"PwC\u2019s \u2018AI studio\u2019 framework is the most practical blueprint yet for scaling AI in PE-backed environments. The centralized model maps directly to the repeatable playbook approach that successful PE firms use.",score:0.73},
  {rank:19,title:"Callosum Raises $10.25M to Break Nvidia\u2019s AI Workload Stranglehold",url:"https://fortune.com/2026/02/26/startup-callosum-cambridge-trained-neuroscientists-raises-10-million-venture-funding-orchestrate-ai-workloads-different-chips/",source:"Fortune",cat:"data",catLabel:"Data Infra",published:"Feb 26",summary:"Cambridge neuroscientists raised $10.25M for orchestration software running AI workloads across different chip architectures \u2014 reducing Nvidia dependency.",overview:"Callosum targets Nvidia lock-in by enabling workload orchestration across heterogeneous chip architectures. For PE portfolio companies with large AI compute bills, chip-agnostic orchestration is a direct path to margin improvement.",score:0.72},
  {rank:20,title:"The 2026 Guide to SaaS, AI, and Agentic Pricing Models",url:"https://www.getmonetizely.com/blogs/the-2026-guide-to-saas-ai-and-agentic-pricing-models",source:"Monetizely",cat:"biz",catLabel:"Biz Impact",published:"Mar 1",summary:"SaaS pricing evolving to outcome-based and agent usage models. Top PLG companies maintaining 120-130% NRR. Seat-based models face competitive pressure.",overview:"The pricing model shift from seat-based to outcome-based is one of the most consequential business model changes in SaaS history. Growth equity investors should evaluate whether portfolio SaaS companies are adapting their pricing architecture.",score:0.71}
];
const catClasses={agentic:"cat-agentic",pe:"cat-pe",data:"cat-data",trends:"cat-trends",biz:"cat-biz"};
function render(filter){
  const c=document.getElementById("articles");
  c.innerHTML="";
  const filtered=filter==="all"?articles:articles.filter(a=>a.cat===filter);
  filtered.forEach(a=>{
    const d=document.createElement("div");
    d.className="article-card";
    d.dataset.cat=a.cat;
    d.innerHTML=`<div class="rank">${a.rank}</div>
      <div class="meta">
        <span class="category-tag ${catClasses[a.cat]}">${a.catLabel}</span>
        <span class="source-label">${a.source} · ${a.published}</span>
      </div>
      <h3><a href="${a.url}" target="_blank" rel="noopener">${a.title}</a></h3>
      <div class="summary">${a.summary}</div>
      <div class="score-bar"><div class="bar"><div class="fill" style="width:${a.score*100}%"></div></div><span class="val">${(a.score*100).toFixed(0)}</span></div>
      <div class="expand-hint">Click to expand analysis</div>
      <div class="overview">${a.overview}</div>`;
    d.addEventListener("click",e=>{if(e.target.tagName!=="A")d.classList.toggle("expanded")});
    c.appendChild(d);
  });
}
document.querySelectorAll(".filter-btn").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    render(b.dataset.cat);
  });
});
render("all");
</script>
</body>
</html>
